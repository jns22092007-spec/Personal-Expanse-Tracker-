DOCTYPE html>
<html>
<head>
    <title>Personal Expense Tracker</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>

<div class="container">

    <h1>Personal Expense Tracker</h1>

    <h2>Add Income</h2>
    <input type="number" id="incomeAmount" placeholder="Enter Income">
    <button onclick="addIncome()">Add Income</button>

    <h2>Add Expense</h2>

    <input type="number" id="expenseAmount" placeholder="Enter Expense">

    <select id="category">
        <option>Food</option>
        <option>Travel</option>
        <option>Shopping</option>
        <option>Education</option>
        <option>Entertainment</option>
        <option>Other</option>
    </select>

    <button onclick="addExpense()">Add Expense</button>

    <h2>Transactions</h2>
    <ul id="transactionList"></ul>

    <h2>Summary</h2>

    <p>Total Income: ₹<span id="totalIncome">0</span></p>

    <p>Total Expense: ₹<span id="totalExpense">0</span></p>

    <p>Balance: ₹<span id="balance">0</span></p>

</div>

<script src="Script.js"></script>

</body>
</html>
